<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="96x96" href="/static/images/logo.png" />

  <title>QR Code Generator — spoo.me</title>
  <meta name="title" content="QR Code Generator API — spoo.me" />
  <meta name="description" content="Open-source QR code generator with classic, gradient, and styled output." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://qr.spoo.me/" />
  <meta property="og:title" content="QR Code Generator API — spoo.me" />
  <meta property="og:description" content="Open-source QR code generator with classic, gradient, and styled output." />
  <meta property="og:image" content="/static/images/banner.png" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://qr.spoo.me/" />
  <meta property="twitter:title" content="QR Code Generator API — spoo.me" />
  <meta property="twitter:description" content="Open-source QR code generator with classic, gradient, and styled output." />
  <meta property="twitter:image" content="/static/images/banner.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/index-style.css" />
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="logo-group">
        <img src="/static/images/logo.png" alt="Logo" width="32" height="32" />
        <span class="wordmark">QR Code Generator</span>
      </div>
      <nav>
        <a href="https://spoo.me/docs/qr/introduction" class="nav-link" target="_blank" rel="noopener"><i class="ti ti-api"></i> <span class="nav-link-text">API Docs</span></a>
        <a href="https://github.com/spoo-me/qr" class="nav-link" target="_blank" rel="noopener"><i class="ti ti-brand-github"></i> <span class="nav-link-text">GitHub</span></a>
        <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <i id="icon-sun" class="ti ti-sun"></i>
          <i id="icon-moon" class="ti ti-moon"></i>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <!-- Left: controls -->
    <div class="controls">
      <section class="card">
        <div class="field">
          <label for="qr-input"><i class="ti ti-link"></i> Text or URL</label>
          <textarea id="qr-input" placeholder="https://example.com" rows="1" autocomplete="off"></textarea>
        </div>

        <div class="divider"></div>

        <div class="field-row">
          <div class="field">
            <label for="qr-type"><i class="ti ti-category"></i> Type</label>
            <div class="select-wrap">
              <select id="qr-type">
                <option value="classic">Classic</option>
                <option value="gradient">Gradient</option>
              </select>
              <i class="ti ti-chevron-down select-icon"></i>
            </div>
          </div>
          <div class="field">
            <label for="module-style"><i class="ti ti-grid-dots"></i> Module Shape</label>
            <div class="select-wrap">
              <select id="module-style">
                <option value="rounded">Rounded</option>
                <option value="square">Square</option>
                <option value="circle">Circle</option>
                <option value="gapped">Gapped</option>
                <option value="horizontal_bars">Horizontal Bars</option>
                <option value="vertical_bars">Vertical Bars</option>
              </select>
              <i class="ti ti-chevron-down select-icon"></i>
            </div>
          </div>
          <div class="field">
            <label for="output-format"><i class="ti ti-file-type-png"></i> Format</label>
            <div class="select-wrap">
              <select id="output-format">
                <option value="png">PNG</option>
                <option value="svg">SVG</option>
              </select>
              <i class="ti ti-chevron-down select-icon"></i>
            </div>
          </div>
        </div>

        <div id="classic-colors" class="field-row">
          <div class="field">
            <label for="fill-color"><i class="ti ti-paint"></i> Fill Color</label>
            <div class="color-field">
              <input type="color" id="fill-color" value="#000000" />
              <span class="color-label" id="fill-color-label">#000000</span>
            </div>
          </div>
          <div class="field">
            <label for="back-color"><i class="ti ti-paint-off"></i> Background</label>
            <div class="color-field">
              <input type="color" id="back-color" value="#ffffff" />
              <span class="color-label" id="back-color-label">#ffffff</span>
            </div>
          </div>
        </div>

        <div id="gradient-colors" style="display:none">
          <div class="field-row">
            <div class="field">
              <label for="gradient1-color"><i class="ti ti-color-swatch"></i> Gradient Start</label>
              <div class="color-field">
                <input type="color" id="gradient1-color" value="#6a1a4c" />
                <span class="color-label" id="gradient1-color-label">#6a1a4c</span>
              </div>
            </div>
            <div class="field">
              <label for="gradient2-color"><i class="ti ti-color-swatch"></i> Gradient End</label>
              <div class="color-field">
                <input type="color" id="gradient2-color" value="#40353c" />
                <span class="color-label" id="gradient2-color-label">#40353c</span>
              </div>
            </div>
            <div class="field">
              <label for="gradient-back-color"><i class="ti ti-paint-off"></i> Background</label>
              <div class="color-field">
                <input type="color" id="gradient-back-color" value="#ffffff" />
                <span class="color-label" id="gradient-back-color-label">#ffffff</span>
              </div>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="gradient-type"><i class="ti ti-arrow-autofit-down"></i> Direction</label>
              <div class="select-wrap">
                <select id="gradient-type">
                  <option value="vertical">Vertical</option>
                  <option value="horizontal">Horizontal</option>
                  <option value="radial">Radial</option>
                  <option value="square">Square</option>
                </select>
                <i class="ti ti-chevron-down select-icon"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="qr-size"><i class="ti ti-dimensions"></i> Size (px)</label>
            <input type="number" id="qr-size" placeholder="Auto" min="10" max="1000" />
          </div>
          <div class="field">
            <label for="logo-upload"><i class="ti ti-photo-up"></i> Logo (optional)</label>
            <input type="file" id="logo-upload" accept="image/*" />
          </div>
        </div>
      </section>

      <button id="generate-btn"><i class="ti ti-qrcode"></i> Generate</button>

      <div id="error-banner" style="display:none"></div>
    </div>

    <!-- Right: preview -->
    <aside class="preview">
      <div class="preview-card card" id="preview-card">
        <h2 class="card-title"><i class="ti ti-eye"></i> Preview</h2>

        <div id="preview-empty" class="preview-empty">
          <i class="ti ti-qrcode empty-icon"></i>
          <p>Your QR code will appear here</p>
        </div>

        <div id="preview-loading" style="display:none">
          <div class="spinner"></div>
        </div>

        <div id="preview-result" style="display:none">
          <div id="qr-output"></div>
          <div class="preview-actions">
            <button id="download-btn" class="btn-secondary">
              <i class="ti ti-download"></i> Download
            </button>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <footer>
    <span>Built with ❤️ by <a href="https://spoo.me" target="_blank" rel="noopener">spoo.me</a></span>
  </footer>

  <script src="/static/js/index-script.js" defer></script>
</body>

</html>
